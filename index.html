<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Fixed - Junior Devlok</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 25px; border-radius: 15px; width: 90%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-top: 0; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0ea5e9; }
        .reset-btn { background: transparent; color: #94a3b8; font-size: 12px; text-decoration: underline; margin-top: 10px; cursor: pointer; border: none; }
        #output { margin-top: 20px; padding: 15px; background: #334155; border-radius: 8px; min-height: 40px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; border-left: 4px solid #38bdf8; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Gemini AI Fixed ✨</h2>

    <div id="keyBox">
        <p style="font-size: 13px;">Apni Nayi API Key yahan daalein:</p>
        <input type="password" id="keyInput" placeholder="Paste API Key here...">
        <button onclick="saveKey()">Connect Gemini</button>
    </div>

    <div id="chatBox" class="hidden">
        <textarea id="promptInput" rows="3" placeholder="Kuch bhi puchein..."></textarea>
        <button id="sendBtn" onclick="askAI()">Jawab Payein</button>
        <div id="output">AI ka jawab yahan aayega...</div>
        <center><button class="reset-btn" onclick="reset()">Reset API Key</button></center>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // 1. Check if Key exists
    function init() {
        if (localStorage.getItem("my_gemini_key")) {
            document.getElementById('keyBox').classList.add('hidden');
            document.getElementById('chatBox').classList.remove('hidden');
        }
    }

    // 2. Save Key
    window.saveKey = function() {
        const key = document.getElementById('keyInput').value.trim();
        if (key.length < 30) return alert("Sahi key daalein!");
        localStorage.setItem("my_gemini_key", key);
        location.reload();
    }

    // 3. Reset Key
    window.reset = function() {
        localStorage.removeItem("my_gemini_key");
        location.reload();
    }

    // 4. Main Function - ERROR FIXED HERE
   window.askAI = async function() {
    const out = document.getElementById('output');
    const key = localStorage.getItem("my_gemini_key");
    const prompt = document.getElementById('promptInput').value;

    try {
        const genAI = new GoogleGenerativeAI(key);
        
        // Yahan 'gemini-1.5-flash-latest' use karein
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash-latest" });

        const result = await model.generateContent(prompt);
        const response = await result.response;
        out.innerText = response.text();
    } catch (err) {
        // Agar fir bhi 404 aaye, toh 'gemini-pro' try karein automatically
        console.log("Retrying with gemini-pro...");
        try {
            const genAI = new GoogleGenerativeAI(key);
            const model = genAI.getGenerativeModel({ model: "gemini-pro" });
            const result = await model.generateContent(prompt);
            const response = await result.response;
            out.innerText = response.text();
        } catch (retryErr) {
            out.innerHTML = `<b style="color:red">Final Error:</b> ${retryErr.message}`;
        }
    }
}
    init();
</script>

</body>
</html>
